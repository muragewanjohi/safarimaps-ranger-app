name: ranger
description: SafariMap GameWarden - Ranger mobile app for wildlife park management
publish_to: 'none'
version: 1.0.8+9

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  go_router: ^15.1.2
  get_it: ^8.0.3
  supabase_flutter: ^2.9.1
  google_maps_flutter: ^2.12.1
  geolocator: ^14.0.0
  geocoding: ^4.0.0
  permission_handler: ^12.0.0+1
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  url_launcher: ^6.3.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  adaptive_icon_background: '#F8F4EC'
  adaptive_icon_foreground: assets/images/logo.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/data/

  fonts:
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
